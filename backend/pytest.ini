[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    unit: Fast unit tests with no external dependencies
    integration: Integration tests that mock external services

# Output — verbose enough to see what's running
addopts =
    --tb=short
    -q

# Fail fast in CI — stop after first failure
# (remove -x for local development to see all failures)
# addopts = -x --tb=short -q
